// Enable radiation for BDB NTRs
//
// author: Malgos
//
// based on Kerbalism default profile config and SkyhawkKerbalism

@PART[bluedog_SNTP_45]:NEEDS[Bluedog_DB,ProfileDefault]:AFTER[KerbalismDefault]
{
  MODULE
  {
    name = Emitter
    radiation = 0.0001388875 // 0.5 rad/h
  }
}

