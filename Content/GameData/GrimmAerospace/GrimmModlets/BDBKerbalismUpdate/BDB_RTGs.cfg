// Enable radiation and generator persistence for BDB RTGs
//
// author: Grimmas 
//
// updated by: Malgos 16/06-2026
//
// based on Kerbalism default profile config

@PART[bluedog_RTG_GPHS]:NEEDS[Bluedog_DB,ProfileDefault]:AFTER[KerbalismDefault]
{
  MODULE
  {
    name = ProcessController
    resource = _RTG
    title = #KERBALISM_RTG_title//RTG
    capacity = 1.5
    running = true
    toggle = false
  }
  
  MODULE
  {
    name = Emitter
    radiation = 0.00004166625 // 0.15 rad/h
  }

  !MODULE[ModuleGenerator] {}
  !MODULE[ModuleCoreHeat] {}
}

